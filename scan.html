<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Escanear — Arraiá Sustentável</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } },
      };
    </script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      html {
        font-family: Inter, system-ui, sans-serif;
      }
      @keyframes point-pop {
        0% {
          transform: scale(0.85);
          opacity: 0;
        }
        55% {
          transform: scale(1.08);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .point-pop {
        animation: point-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      #qr-reader video {
        border-radius: 1rem;
      }
    </style>
  </head>
  <body class="relative min-h-screen bg-[#0c0a09] text-neutral-100 antialiased" data-page="scan">
    <div
      id="scan-feedback-root"
      class="pointer-events-none fixed inset-0 z-[200] flex items-center justify-center bg-black/70 opacity-0 transition-opacity duration-300"
      aria-hidden="true"
    >
      <div
        class="rounded-3xl border border-[#facc15]/30 bg-neutral-900 px-10 py-8 text-center shadow-2xl shadow-[#facc15]/20"
      >
        <p
          id="scan-feedback-delta"
          class="point-pop bg-gradient-to-r from-[#facc15] to-orange-400 bg-clip-text text-5xl font-bold tabular-nums text-transparent"
        >
          +10
        </p>
        <p class="mt-2 text-sm text-neutral-400">pontos</p>
        <p class="mt-4 text-xs text-neutral-500">
          Total <span id="scan-feedback-total" class="font-semibold text-neutral-200">0</span> pontos
        </p>
      </div>
    </div>

    <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
      <div class="absolute left-0 right-0 top-0 flex justify-center gap-1.5 py-3 opacity-80" aria-hidden="true">
        <span class="inline-block h-0 w-0 border-l-[6px] border-r-[6px] border-b-[12px] border-l-transparent border-r-transparent border-b-red-500"></span>
        <span class="inline-block h-0 w-0 border-l-[6px] border-r-[6px] border-b-[12px] border-l-transparent border-r-transparent border-b-yellow-400"></span>
        <span class="inline-block h-0 w-0 border-l-[6px] border-r-[6px] border-b-[12px] border-l-transparent border-r-transparent border-b-blue-500"></span>
      </div>
    </div>

    <div class="relative z-10 mx-auto flex min-h-screen max-w-[420px] items-start justify-center px-3 py-6 md:items-center md:py-10">
      <div
        class="flex w-full max-w-[390px] flex-col overflow-hidden rounded-[2.75rem] border-[12px] border-neutral-800 bg-neutral-900 shadow-2xl shadow-black/70 ring-1 ring-white/[0.06]"
      >
        <div class="flex justify-center bg-neutral-950 pb-1 pt-3">
          <div class="h-5 w-24 rounded-full bg-neutral-800" aria-hidden="true"></div>
        </div>

        <div class="flex max-h-[min(812px,calc(100dvh-5rem))] min-h-[560px] flex-1 flex-col bg-neutral-950">
          <main class="min-h-0 flex-1 overflow-y-auto px-4 pb-2 pt-4">
            <header class="mb-5">
              <p class="text-xs font-medium uppercase tracking-wider text-neutral-500">Leitura</p>
              <h1 class="text-2xl font-semibold text-neutral-100">Escanear QR</h1>
              <p class="mt-1 text-sm text-neutral-400">Aponte para o código ou informe manualmente.</p>
            </header>

            <div
              class="relative overflow-hidden rounded-2xl border border-neutral-800 bg-neutral-900 shadow-inner ring-1 ring-white/5"
            >
              <div
                class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center"
                aria-hidden="true"
              >
                <div
                  class="h-[200px] w-[200px] rounded-2xl border-2 border-[#facc15]/40 shadow-[0_0_40px_rgba(250,204,21,0.15)]"
                ></div>
              </div>
              <div id="qr-reader" class="min-h-[260px] bg-neutral-950"></div>
            </div>

            <form id="scan-manual-form" class="mt-6 space-y-3">
              <label for="scan-manual-input" class="block text-sm font-medium text-neutral-300"
                >Ou digite o código</label
              >
              <input
                id="scan-manual-input"
                type="text"
                placeholder="Ex.: estande — reciclagem"
                autocomplete="off"
                class="w-full rounded-xl border border-neutral-700 bg-neutral-800 px-4 py-3 text-sm text-white placeholder:text-neutral-600 focus:border-[#facc15] focus:outline-none focus:ring-2 focus:ring-[#facc15]/40"
              />
              <button
                type="submit"
                class="w-full rounded-2xl border border-neutral-700 bg-neutral-900 py-3 text-sm font-semibold text-neutral-100 transition-all duration-200 hover:scale-105 hover:border-[#3b82f6]/50 hover:bg-neutral-800"
              >
                Registrar leitura
              </button>
            </form>
          </main>

          <nav
            class="shrink-0 border-t border-neutral-800 bg-neutral-900/98 px-1 pb-3 pt-2 backdrop-blur-md"
            aria-label="Principal"
          >
            <div class="flex justify-around">
              <a
                href="index.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Início
              </a>
              <a
                href="scan.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-[#facc15] transition-all duration-200"
              >
                <span class="h-0.5 w-7 rounded-full bg-[#facc15]"></span>
                Escanear
              </a>
              <a
                href="rewards.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Recompensas
              </a>
              <a
                href="profile.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Perfil
              </a>
            </div>
          </nav>
        </div>
      </div>
    </div>

    <script src="js/arraia-app.js" defer></script>
  </body>
</html>
