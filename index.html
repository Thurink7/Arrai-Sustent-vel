<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Arraiá Sustentável</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      html {
        font-family: Inter, system-ui, sans-serif;
      }
      @keyframes point-pop {
        0% {
          transform: scale(0.85);
          opacity: 0;
        }
        55% {
          transform: scale(1.06);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .point-pop {
        animation: point-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .bandeira {
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-bottom: 14px solid var(--c);
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.4));
      }
    </style>
  </head>
  <body
    class="relative min-h-screen bg-[#0c0a09] text-neutral-100 antialiased"
    data-page="dashboard"
  >
    <!-- Decoração nordestina (fora do celular) -->
    <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
      <div
        class="absolute left-0 right-0 top-0 flex justify-center gap-1.5 py-4 opacity-[0.92]"
        aria-hidden="true"
      >
        <span class="bandeira" style="--c: #ef4444"></span>
        <span class="bandeira" style="--c: #facc15"></span>
        <span class="bandeira" style="--c: #3b82f6"></span>
        <span class="bandeira" style="--c: #22c55e"></span>
        <span class="bandeira" style="--c: #ef4444"></span>
        <span class="bandeira" style="--c: #facc15"></span>
        <span class="bandeira" style="--c: #3b82f6"></span>
      </div>
      <!-- Cactos -->
      <svg
        class="absolute bottom-8 left-2 h-28 w-20 text-emerald-800/50 md:left-8"
        viewBox="0 0 80 120"
        fill="currentColor"
        aria-hidden="true"
      >
        <ellipse cx="40" cy="110" rx="28" ry="8" class="text-emerald-900/40" />
        <rect x="34" y="60" width="12" height="52" rx="4" />
        <ellipse cx="40" cy="58" rx="18" ry="22" />
        <ellipse cx="22" cy="48" rx="10" ry="14" />
        <ellipse cx="58" cy="42" rx="11" ry="16" />
      </svg>
      <svg
        class="absolute bottom-6 right-2 h-32 w-24 text-emerald-800/45 md:right-10"
        viewBox="0 0 90 130"
        fill="currentColor"
        aria-hidden="true"
      >
        <ellipse cx="45" cy="118" rx="32" ry="9" class="text-emerald-900/35" />
        <rect x="38" y="55" width="14" height="58" rx="5" />
        <ellipse cx="45" cy="52" rx="20" ry="26" />
        <ellipse cx="24" cy="58" rx="12" ry="18" />
        <ellipse cx="68" cy="50" rx="13" ry="20" />
      </svg>
    </div>

    <div class="relative z-10 mx-auto flex min-h-screen max-w-[420px] items-start justify-center px-3 py-6 md:items-center md:py-10">
      <!-- Moldura de celular -->
      <div
        class="flex w-full max-w-[390px] flex-col overflow-hidden rounded-[2.75rem] border-[12px] border-neutral-800 bg-neutral-900 shadow-2xl shadow-black/70 ring-1 ring-white/[0.06]"
      >
        <div class="flex justify-center bg-neutral-950 pb-1 pt-3">
          <div class="h-5 w-24 rounded-full bg-neutral-800" aria-hidden="true"></div>
        </div>

        <div
          class="flex max-h-[min(812px,calc(100dvh-5rem))] min-h-[520px] flex-1 flex-col bg-neutral-950"
        >
          <main class="min-h-0 flex-1 overflow-y-auto px-4 pb-2 pt-4">
            <header class="mb-6">
              <p class="text-2xl font-semibold leading-tight text-neutral-100" id="dashboard-greeting">
                Olá
              </p>
        <p class="mt-1 max-w-[280px] text-sm text-neutral-400" id="dashboard-sub">
          Um momento…
        </p>
            </header>

            <section
              class="relative overflow-hidden rounded-2xl border border-neutral-800 bg-neutral-900 p-5 shadow-lg shadow-[#facc15]/10"
            >
              <div
                class="pointer-events-none absolute -right-8 -top-8 h-32 w-32 rounded-full bg-gradient-to-br from-[#facc15]/20 to-transparent blur-2xl"
              ></div>
              <p class="text-sm font-medium text-neutral-400">Seus pontos</p>
              <p
                class="mt-1 bg-gradient-to-r from-[#facc15] to-orange-400 bg-clip-text text-4xl font-bold tabular-nums text-transparent"
                id="dashboard-pontos"
              >
                0
              </p>
              <div id="dashboard-progress" class="mt-4"></div>
              <div class="mt-4 flex items-center gap-2 text-xs text-neutral-500">
                <span
                  class="inline-flex h-6 items-center rounded-full border border-neutral-700 bg-neutral-800/80 px-2 font-medium text-neutral-300"
                  >Streak <span id="dashboard-streak" class="ml-1 text-[#facc15]">0</span></span
                >
              </div>
            </section>

            <a
              href="scan.html"
              class="mt-5 flex w-full items-center justify-center rounded-2xl bg-[#facc15] py-3.5 text-sm font-semibold text-black shadow-lg shadow-[#facc15]/20 transition-all duration-200 hover:scale-105 hover:bg-yellow-300 active:scale-100"
            >
              Escanear QR Code
            </a>

            <div class="mt-3 grid grid-cols-2 gap-2">
              <a
                href="history.html"
                class="rounded-2xl border border-neutral-800 bg-neutral-900/50 px-3 py-3 text-center text-sm font-medium text-neutral-300 transition-all duration-200 hover:border-neutral-700 hover:bg-neutral-900"
                >Histórico</a
              >
              <a
                href="map.html"
                class="rounded-2xl border border-neutral-800 bg-neutral-900/50 px-3 py-3 text-center text-sm font-medium text-neutral-300 transition-all duration-200 hover:border-neutral-700 hover:bg-neutral-900"
                >Mapa</a
              >
            </div>

            <section class="mt-6 rounded-2xl border border-neutral-800 bg-neutral-900 p-5 shadow-lg">
              <div class="flex items-center justify-between">
                <h2 class="text-sm font-semibold text-neutral-200">Última atividade</h2>
                <span class="text-xs text-neutral-500" id="dashboard-ultima">—</span>
              </div>
              <div id="dashboard-history-preview" class="mt-2"></div>
            </section>
          </main>

          <nav
            class="shrink-0 border-t border-neutral-800 bg-neutral-900/98 px-1 pb-3 pt-2 backdrop-blur-md"
            aria-label="Principal"
          >
            <div class="flex justify-around">
              <a
                href="index.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-[#facc15] transition-all duration-200"
              >
                <span class="h-0.5 w-7 rounded-full bg-[#facc15]"></span>
                Início
              </a>
              <a
                href="scan.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Escanear
              </a>
              <a
                href="rewards.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Recompensas
              </a>
              <a
                href="profile.html"
                class="flex min-w-[56px] flex-col items-center gap-0.5 text-[11px] font-medium text-neutral-500 transition-all duration-200 hover:text-neutral-300"
              >
                <span class="h-0.5 w-7 rounded-full bg-transparent"></span>
                Perfil
              </a>
            </div>
          </nav>
        </div>
      </div>
    </div>

    <script src="js/arraia-app.js" defer></script>
  </body>
</html>
